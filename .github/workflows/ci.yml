name: CineAI DevSecOps CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

            - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=kavyad-bytes
            -Dsonar.projectKey=kavyad-bytes_CineAI-DevSecOpsAI
            -Dsonar.sources=backend/src,frontend/src
            -Dsonar.java.binaries=backend/target/classes

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-frontend:latest ./frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cineai-backend:latest
          severity: CRITICAL
          exit-code: 1

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cineai-frontend:latest
          severity: CRITICAL
          exit-code: 1

      - name: Push backend image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/cineai-backend:latest

      - name: Push frontend image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/cineai-frontend:latest

  zap-dast:
    runs-on: ubuntu-latest
    needs: build-test-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start app with Docker Compose
        run: docker compose up -d --build

      - name: Wait for frontend
        run: |
          sleep 60
          curl -I http://localhost:5173

      - name: OWASP ZAP Baseline Scan
        run: |
          docker run --network host -v ${{ github.workspace }}:/zap/wrk/:rw zaproxy/zap-stable zap-baseline.py \
            -t http://localhost:5173 \
            -r zap-report.html \
            -w zap-report.md \
            -J zap-report.json \
            -I

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-security-report
          path: |
            zap-report.html
            zap-report.md
            zap-report.json

      - name: Stop app
        if: always()
        run: docker compose down