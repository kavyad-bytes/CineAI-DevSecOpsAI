name: CineAI DevSecOps CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Run Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: auto

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }} ./backend

      - name: Build frontend Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }} ./frontend

      - name: Trivy scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

      - name: Trivy scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

      - name: Push backend image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/cineai-backend:${{ github.sha }}

      - name: Push frontend image
        if: github.event_name == 'push'
        run: docker push ghcr.io/${{ github.repository_owner }}/cineai-frontend:${{ github.sha }}