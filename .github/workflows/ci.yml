name: CineAI DevSecOps CI

on:
  push:
    branches: ["main"]

jobs:
  build-test-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Java build
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      # Node build
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/cineai-frontend:latest ./frontend

      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository_owner }}/cineai-backend:latest

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository_owner }}/cineai-frontend:latest