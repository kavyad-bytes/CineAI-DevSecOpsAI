apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: cineai
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-service:5432/cineai
  MINIO_URL: http://minio-service:9000
  MINIO_BUCKET: movies
  OLLAMA_URL: http://ollama-service:11434
  OLLAMA_MODEL: llama3.2
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: cineai
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cineai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: cineai-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: cineai
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081