apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: cineai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama
          ports:
            - containerPort: 11434
          resources:
            limits:
              memory: "4Gi"
              cpu: "2"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: cineai
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434